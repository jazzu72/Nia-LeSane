name: Autonomous Task Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run autonomous task
        run: npm run nia:task
