# Hardened Input Extraction
{
  echo "is_nia_command=$(echo "${{ github.event.issue.title || github.event.pull_request.title }}" | grep -q '\[NIA\]' && echo 'true' || echo 'false')"
  
  # Use heredoc for body/title to handle multi-line and special characters
  echo "issue_title<<EOF"
  echo "${{ github.event.issue.title || github.event.pull_request.title }}"
  echo "EOF"
  
  echo "issue_body<<EOF"
  echo "${{ github.event.issue.body || github.event.pull_request.body }}"
  echo "EOF"
} >> $GITHUB_OUTPUT
